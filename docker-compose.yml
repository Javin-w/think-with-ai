services:
  # 一次性容器：构建前端并复制产物到 volume
  client-build:
    build:
      context: .
      target: builder
    volumes:
      - client-dist:/output
    entrypoint: ["sh", "-c", "cp -r /app/apps/client/dist/* /output/"]
    restart: "no"

  # 后端服务
  server:
    build:
      context: .
      target: server
    env_file:
      - .env
    environment:
      - PORT=3000
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Nginx 反向代理 + 静态文件
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - client-dist:/usr/share/nginx/html:ro
    depends_on:
      - server
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  client-dist:
